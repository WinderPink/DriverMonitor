<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/192/192167.png">
    <title>Driver Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@2.0.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #0a1a1f; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            padding: 15px; 
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .container { 
            width: 100%;
            max-width: 96%; 
            background: #1e2f33; 
            padding: 1.2rem; 
            border-radius: 1.5rem; 
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .video-box { 
            position: relative; 
            width: 100%;
            aspect-ratio: 9 / 16; 
            background: #000; 
            border-radius: 1rem; 
            overflow: hidden;
        }
        video, canvas#canvas { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
        }
        canvas#canvas { pointer-events: none; }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .info { 
            display: flex; 
            flex-direction: column; 
            gap: 0.8rem; 
            flex: 1; 
        }

        .chart-card {
            background: #2a3b3f;
            border-radius: 1rem;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            flex: 1; 
        }
        .chart-card canvas {
            width: 100%;
            height: auto;
            background: #1a282c;
            border-radius: 0.5rem;
            display: block;
        }
        .chart-label {
            display: flex;
            justify-content: space-between;
            color: #ddd;
            font-size: 0.85rem;
            padding: 0 0.2rem;
        }

        .alert-card { 
            background: #aa2e1e; 
            animation: pulse 0.8s infinite; 
            padding: 1rem;
            border-radius: 1rem;
            text-align: center;
            color: white;
            font-size: 1rem;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        button { 
            background: #0f0; 
            color: #000; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 0.95rem;
            flex: 1 0 auto;
            min-width: 120px;
            transition: opacity 0.2s;
        }
        button:active { opacity: 0.7; }

        .log { 
            background: #000; 
            color: #0f0; 
            font-size: 13px; 
            padding: 10px; 
            border-radius: 0.8rem; 
            height: 120px; 
            overflow-y: auto; 
            word-break: break-word;
        }

        @media (min-width: 768px) and (orientation: landscape) {
            .main-content {
                flex-direction: row;
                align-items: stretch;
            }
            .video-box {
                flex: 0 0 75%;
                aspect-ratio: auto; 
            }
            .side-panel {
                flex: 1;
                min-width: 0;
            }
            .chart-card canvas {
                height: 150px; 
            }
            .alert-card {
                flex: 0 0 auto;
            }
        }

        @media (max-width: 400px) {
            body { padding: 8px; }
            .container { padding: 0.8rem; }
            button { padding: 10px 14px; font-size: 0.85rem; }
            .chart-card canvas { height: 100px; }
        }

        @media (max-width: 768px) {
            .main-content {
                flex-direction: column; 
            }

            .video-box {
                height: 50vh; 
                aspect-ratio: auto;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h2 style="color:#0f0; text-align: center; margin: 0;">Giám sát tài xế</h2>
    <div class="main-content">
        <div class="video-box">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="canvas"></canvas>
        </div>
        <div class="side-panel">
            <div class="info">

                <div class="chart-card" id="earChartCard">
                    <canvas id="earChart"></canvas>
                    <div class="chart-label">
                        <span>EAR: <span id="earVal">--</span></span>
                        <span id="eyeState">--</span>
                    </div>
                </div>

                <div class="chart-card" id="marChartCard">
                    <canvas id="marChart"></canvas>
                    <div class="chart-label">
                        <span>MAR: <span id="marVal">--</span></span>
                        <span id="yawnState">--</span>
                    </div>
                </div>

                <div class="alert-card" id="alertCard" style="color:#fff; font-weight: bold; padding: 1rem;">
                    Cảnh báo: <span id="alertMsg">Ổn định</span>
                </div>
            </div>
            <div class="btn-group">
                <button id="resetBtn">Reset cảnh báo</button>
                <button id="toggleBtn">Ẩn/hiện landmarks</button>
            </div>
            <div class="log" id="log"></div>
        </div>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('SW registered!', reg))
                .catch(err => console.log('SW registration failed!', err));
        });
    }
    (function(){
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const logDiv = document.getElementById('log');
        let showLandmarks = true;
        let modelReady = false;

        const EAR_THRESH = 0.24;
        const MAR_THRESH = 0.48;
        const DROWSY_FRAMES = 6;
        const STABLE_FRAMES = 3;

        let earHistory = [];
        const EAR_HISTORY_LEN = 5;

        let eyeClosedStable = false;
        let eyeClosedCounter = 0;
        let eyeOpenCounter = 0;

        let drowsyFrameCount = 0;
        let drowsyAlertActive = false;
        let lastYawnTime = 0;

        const MAX_CHART_POINTS = 150;
        let earChartData = [];
        let marChartData = [];

        let audioCtx = null;
        function playBeep(frequency = 800, duration = 0.3, volume = 0.5) {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                const now = audioCtx.currentTime;
                const oscillator = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                oscillator.connect(gain);
                gain.connect(audioCtx.destination);
                oscillator.frequency.value = frequency;
                gain.gain.value = volume;
                oscillator.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, now + duration);
                oscillator.stop(now + duration);
            } catch(e) { console.log("Audio error:", e); }
        }

        function addLog(msg) {
            const p = document.createElement('div');
            p.textContent = new Date().toLocaleTimeString() + ' - ' + msg;
            logDiv.appendChild(p);
            p.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            console.log(msg);
        }

        function dist(p1, p2) { return Math.hypot(p1.x - p2.x, p1.y - p2.y); }
        function calculateEAR(eyePoints) {
            const v1 = dist(eyePoints[1], eyePoints[5]);
            const v2 = dist(eyePoints[2], eyePoints[4]);
            const h = dist(eyePoints[0], eyePoints[3]);
            return h === 0 ? 0.5 : (v1 + v2) / (2.0 * h);
        }
        function calculateMAR(landmarks) {
            const left = landmarks[48], right = landmarks[54], up = landmarks[62], down = landmarks[66];
            const w = dist(left, right);
            if (w < 0.01) return 0;
            return dist(up, down) / w;
        }

        function drawResults(detection) {
            if (!ctx || !showLandmarks || !detection) return;
            const pts = detection.landmarks.positions;
            const box = detection.detection.box;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#0f0';
            ctx.lineWidth = 2;
            ctx.strokeRect(box.x, box.y, box.width, box.height);
            for (let p of pts) {
                ctx.fillStyle = '#ffd966';
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, 2*Math.PI);
                ctx.fill();
            }
        }

        function smoothEAR(rawEAR) {
            earHistory.push(rawEAR);
            if (earHistory.length > EAR_HISTORY_LEN) earHistory.shift();
            return earHistory.reduce((a,b) => a+b, 0) / earHistory.length;
        }

        function drawChart(canvasId, data, yMax, color, currentValue, statusText) {
            const cvs = document.getElementById(canvasId);
            if (!cvs) return;
            const w = cvs.width = cvs.clientWidth || 300;
            const h = cvs.height = cvs.clientHeight || 150;
            const gctx = cvs.getContext('2d');
            gctx.clearRect(0, 0, w, h);

            // Nền
            gctx.fillStyle = '#1a282c';
            gctx.fillRect(0, 0, w, h);

            if (data.length < 2) {
                gctx.fillStyle = '#aaa';
                gctx.font = '12px monospace';
                gctx.textAlign = 'center';
                gctx.fillText('Đang chờ dữ liệu...', w/2, h/2);
                return;
            }

            const stepX = w / (data.length - 1);
            const rangeY = h - 20; 
            const zeroY = h - 10;

            gctx.beginPath();
            gctx.strokeStyle = color;
            gctx.lineWidth = 2;
            for (let i = 0; i < data.length; i++) {
                const x = i * stepX;
                const y = zeroY - (data[i] / yMax) * rangeY;
                if (i === 0) gctx.moveTo(x, y);
                else gctx.lineTo(x, y);
            }
            gctx.stroke();

            const lastX = (data.length - 1) * stepX;
            const lastY = zeroY - (data[data.length-1] / yMax) * rangeY;
            gctx.beginPath();
            gctx.arc(lastX, lastY, 3, 0, 2*Math.PI);
            gctx.fillStyle = color;
            gctx.fill();

            gctx.fillStyle = '#fff';
            gctx.font = 'bold 11px monospace';
            gctx.textAlign = 'left';
            gctx.fillText(currentValue.toFixed(3), 5, 15);
            gctx.textAlign = 'right';
            gctx.fillText(statusText, w-5, 15);

            gctx.beginPath();
            gctx.strokeStyle = '#444';
            gctx.lineWidth = 1;
            gctx.moveTo(0, zeroY);
            gctx.lineTo(w, zeroY);
            gctx.stroke();
        }

        function resetAllStates() {
            drowsyFrameCount = 0;
            drowsyAlertActive = false;
            eyeClosedStable = false;
            eyeClosedCounter = 0;
            eyeOpenCounter = 0;
            earChartData = [];
            marChartData = [];
            earHistory = [];
            document.getElementById('alertCard').classList.remove('alert-card');
            document.getElementById('alertMsg').textContent = "Đã reset";
            document.getElementById('eyeState').textContent = "--";
            document.getElementById('yawnState').textContent = "--";
            document.getElementById('earVal').textContent = "--";
            document.getElementById('marVal').textContent = "--";
            setTimeout(() => {
                if (document.getElementById('alertMsg').textContent === "Đã reset")
                    document.getElementById('alertMsg').textContent = "Ổn định";
            }, 1500);
            addLog("Reset cảnh báo (tự động khi khởi động)");
        }

        function updateUI(ear, mar, rawEyesClosed, isYawning) {
            if (rawEyesClosed) {
                eyeOpenCounter = 0;
                eyeClosedCounter++;
                if (eyeClosedCounter >= STABLE_FRAMES && !eyeClosedStable) {
                    eyeClosedStable = true;
                }
            } else {
                eyeClosedCounter = 0;
                eyeOpenCounter++;
                if (eyeOpenCounter >= STABLE_FRAMES && eyeClosedStable) {
                    eyeClosedStable = false;
                }
            }
            const eyesClosed = eyeClosedStable;

            document.getElementById('earVal').textContent = ear.toFixed(3);
            document.getElementById('marVal').textContent = mar.toFixed(3);
            document.getElementById('eyeState').textContent = eyesClosed ? "NHẮM" : "MỞ";

            const now = Date.now();
            earChartData.push(ear);
            marChartData.push(mar);
            if (earChartData.length > MAX_CHART_POINTS) earChartData.shift();
            if (marChartData.length > MAX_CHART_POINTS) marChartData.shift();

            drawChart('earChart', earChartData, 0.5, '#00ff00', ear, eyesClosed ? 'NHẮM' : 'MỞ');
            drawChart('marChart', marChartData, 1.0, '#ffaa00', mar, isYawning ? 'NGÁP' : 'BT');

            if (isYawning && now - lastYawnTime > 3000) {
                lastYawnTime = now;
                document.getElementById('yawnState').textContent = "NGÁP!";
                document.getElementById('alertMsg').textContent = "PHÁT HIỆN NGÁP!";
                playBeep(1200, 0.4, 0.6);
                setTimeout(() => {
                    if (document.getElementById('yawnState').textContent === "NGÁP!") 
                        document.getElementById('yawnState').textContent = "Bình thường";
                }, 2000);
            } else if (isYawning) {
                document.getElementById('yawnState').textContent = "Đang ngáp...";
            } else {
                if (document.getElementById('yawnState').textContent !== "NGÁP!")
                    document.getElementById('yawnState').textContent = "Bình thường";
            }

            if (eyesClosed) {
                drowsyFrameCount++;
            } else {
                drowsyFrameCount = 0;
            }
            const alertCard = document.getElementById('alertCard');
            const alertMsgSpan = document.getElementById('alertMsg');
            if (drowsyFrameCount >= DROWSY_FRAMES && !drowsyAlertActive) {
                drowsyAlertActive = true;
                alertMsgSpan.textContent = "BUỒN NGỦ! DỪNG XE";
                alertCard.classList.add('alert-card');
                playBeep(550, 1.0, 0.8);
                addLog("Cảnh báo buồn ngủ!");
            } else if (!eyesClosed && drowsyFrameCount === 0 && drowsyAlertActive) {
                drowsyAlertActive = false;
                alertCard.classList.remove('alert-card');
                alertMsgSpan.textContent = "Tỉnh táo trở lại";
                setTimeout(() => {
                    if (alertMsgSpan.textContent === "Tỉnh táo trở lại") alertMsgSpan.textContent = "Ổn định";
                }, 2000);
            } else if (drowsyAlertActive) {
                alertMsgSpan.textContent = "BUỒN NGỦ! NGHỈ NGƠI";
            }
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: "user" } 
                });
                video.srcObject = stream;
                await new Promise(resolve => video.onloadedmetadata = resolve);
                video.play();
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                addLog("Webcam OK");
                return true;
            } catch(e) {
                addLog("Lỗi webcam: " + e.message);
                return false;
            }
        }

        async function loadModels() {
            addLog("Đang tải model...");
            try {
                const testUrl = 'models/tiny_face_detector_model-weights_manifest.json';
                const response = await fetch(testUrl);
                if (!response.ok) throw new Error(`Không tìm thấy file: ${testUrl}`);
                await faceapi.nets.tinyFaceDetector.loadFromUri('models');
                await faceapi.nets.faceLandmark68Net.loadFromUri('models');
                modelReady = true;
                addLog("Model sẵn sàng!");
                return true;
            } catch(err) {
                addLog("Lỗi model: " + err.message);
                return false;
            }
        }

        let processing = false;
        async function detect() {
            if (!modelReady || !video.videoWidth || processing) {
                requestAnimationFrame(detect);
                return;
            }
            processing = true;
            try {
                const det = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks();
                if (!det) {
                    ctx.clearRect(0,0,canvas.width,canvas.height);
                    ctx.fillStyle = "#ffaaaa";
                    ctx.font = "16px monospace";
                    ctx.fillText("Không thấy mặt", 20, 50);
                    processing = false;
                    requestAnimationFrame(detect);
                    return;
                }
                const pts = det.landmarks.positions;
                const leftEye = pts.slice(36,42);
                const rightEye = pts.slice(42,48);
                let rawEAR = (calculateEAR(leftEye) + calculateEAR(rightEye)) / 2;
                const smoothedEAR = smoothEAR(rawEAR);
                const mar = calculateMAR(pts);
                const rawEyesClosed = smoothedEAR < EAR_THRESH;
                const isYawning = mar > MAR_THRESH;
                updateUI(smoothedEAR, mar, rawEyesClosed, isYawning);
                drawResults(det);
            } catch(e) { console.error(e); }
            processing = false;
            requestAnimationFrame(detect);
        }

        document.getElementById('resetBtn').onclick = resetAllStates;
        document.getElementById('toggleBtn').onclick = () => {
            showLandmarks = !showLandmarks;
            if (!showLandmarks) ctx.clearRect(0,0,canvas.width,canvas.height);
        };

        (async function main() {
            const cam = await startCamera();
            if (!cam) return;
            const models = await loadModels();
            if (models) {
                resetAllStates();
                detect();
            }
        })();
    })();
</script>
</body>
</html>
